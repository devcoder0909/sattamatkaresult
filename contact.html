<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Satta Matka Authority</title>
    <meta name="description" content="Contact the Satta Matka Authority for business inquiries, historical data corrections, or advertising opportunities.">
    <link rel="canonical" href="https://example-authority.com/contact.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; margin: 0; }
        .header { height: 70px; background: rgba(2,6,23,0.9); border-bottom: 1px solid #334155; display: flex; align-items: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; width: 100%; box-sizing: border-box; }
        .hero-sm { padding: 4rem 0; text-align: center; border-bottom: 1px solid #334155; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-primary); font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-primary); border-radius: 0.375rem; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-neon); }
    </style>
    <link rel="stylesheet" href="assets/css/style.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="assets/css/style.css"></noscript>
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="/" class="logo">Matka<span>Authority</span></a>
            <button class="mobile-menu-btn" aria-label="Toggle Menu">☰</button>
            <nav class="nav-links">
                <a href="markets/index.html">Markets</a>
                <a href="timings.html">Timings</a>
                <a href="faq.html">FAQ</a>
            </nav>
            <button class="theme-toggle" aria-label="Toggle Dark/Light Mode">☀️</button>
        </div>
    </header>

    <main>
        <section class="hero-sm">
            <div class="container">
                <ul class="breadcrumb justify-center" style="justify-content: center; margin-bottom: 1rem;">
                    <li><a href="/">Home</a></li>
                    <li>Contact</li>
                </ul>
                <h1>Contact Us</h1>
                <p>Get in touch for corrections, advertising, or general inquiries.</p>
            </div>
        </section>

        <section class="section container" style="max-width: 600px;">
            <div class="card">
                <form action="#" method="POST" id="contactForm" onsubmit="event.preventDefault(); alert('Message sent successfully (Demo)');">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-primary); border-radius: 0.375rem;">
                            <option value="general">General Inquiry</option>
                            <option value="correction">Data Correction</option>
                            <option value="advertising">Advertising</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
                
                <div class="mt-4 text-center">
                    <p>Or email us directly at:<br> <a href="mailto:contact@example-authority.com" style="color: var(--accent-gold); font-weight: bold;">contact@example-authority.com</a></p>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 Satta Matka Authority.</p></div></div>
    </footer>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
